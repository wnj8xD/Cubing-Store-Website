<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanh toán | CubeVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    :root {
        --bg: #050d1a;
        --card-bg: rgba(13, 25, 48, 0.85);
        --accent: #0072ff;
        --accent-light: #00d4ff;
        --text: #e8f4ff;
        --border: rgba(0, 114, 255, 0.3);
        --error: #ff3d6e;
        --success: #00ff88;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Be Vietnam Pro', sans-serif;
        background-image: radial-gradient(circle at 50% 0%, #102a4d 0%, #050d1a 70%);
        min-height: 100vh;
    }

    /* --- HEADER --- */
    header {
        background: rgba(5, 13, 26, 0.9);
        border-bottom: 1px solid var(--border);
        padding: 15px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(10px);
    }
    .logo {
        font-family: 'Exo 2', sans-serif;
        font-weight: 900;
        font-size: 24px;
        text-transform: uppercase;
        color: var(--accent-light);
        text-decoration: none;
    }

    /* --- BACK BUTTON --- */
    .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--accent-light);
        font-size: 0.9rem;
        cursor: pointer;
        padding: 10px 0;
        transition: 0.3s;
    }
    .btn-back:hover { opacity: 0.7; transform: translateX(-5px); }

    .checkout-container {
        max-width: 1100px;
        margin: 20px auto 60px;
        padding: 0 20px;
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 30px;
    }

    .glass-panel {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 25px;
        backdrop-filter: blur(10px);
    }

    h2 {
        font-family: 'Exo 2', sans-serif;
        font-size: 1.1rem;
        margin-bottom: 20px;
        color: var(--accent-light);
        text-transform: uppercase;
    }

    /* Form & Input */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.8rem; margin-bottom: 6px; opacity: 0.7; }
    input {
        width: 100%; padding: 12px; border-radius: 8px;
        background: rgba(255,255,255,0.05); border: 1px solid var(--border);
        color: white; outline: none; transition: 0.3s;
    }
    input:focus { border-color: var(--accent-light); background: rgba(255,255,255,0.1); }

    /* Payment Selector */
    .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .pay-box {
        border: 1px solid var(--border); border-radius: 10px; padding: 15px;
        text-align: center; cursor: pointer; transition: 0.3s;
        background: rgba(255,255,255,0.02);
    }
    .pay-box.active { border-color: var(--accent-light); background: rgba(0, 114, 255, 0.15); }
    .pay-box svg { width: 35px; height: 35px; margin-bottom: 8px; fill: currentColor; }

    .dynamic-content { max-height: 0; overflow: hidden; transition: 0.5s ease; opacity: 0; }
    .dynamic-content.show { max-height: 400px; opacity: 1; margin-top: 15px; }

    /* Order Summary */
    .summary-item { display: flex; gap: 12px; margin-bottom: 15px; align-items: center; }
    .summary-img { width: 50px; height: 50px; border-radius: 6px; border: 1px solid var(--border); object-fit: cover; }
    
    .coupon-area { margin: 20px 0; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); }
    .coupon-input { display: flex; gap: 10px; margin-top: 8px; }
    .btn-apply { padding: 0 15px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 600; }
    #coupon-msg { font-size: 0.75rem; margin-top: 5px; }

    .price-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
    .total-row {
        border-top: 1px solid var(--border); padding-top: 15px; margin-top: 10px;
        display: flex; justify-content: space-between;
        font-size: 1.3rem; font-weight: 700; color: var(--accent-light);
    }

    /* MODAL */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
        display: none; align-items: center; justify-content: center; z-index: 2000;
    }
    .modal-content {
        background: #0a192f; border: 2px solid var(--accent-light);
        padding: 30px; border-radius: 15px; max-width: 400px; width: 90%; text-align: center;
        box-shadow: 0 0 30px rgba(0, 114, 255, 0.5);
    }
    .modal-btns { display: flex; gap: 15px; margin-top: 25px; justify-content: center; }
    .btn-yes, .btn-no {
        padding: 12px 30px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase;
    }
    .btn-yes { background: var(--accent-light); color: #000; }
    .btn-no { background: rgba(255,255,255,0.1); color: white; }

    .btn-final {
        width: 100%; padding: 16px; border-radius: 10px; border: none;
        background: linear-gradient(90deg, var(--accent), var(--accent-light));
        color: white; font-weight: 900; font-family: 'Exo 2'; cursor: pointer;
        text-transform: uppercase; margin-top: 20px;
    }

    footer { background: #020812; padding: 30px; text-align: center; opacity: 0.5; font-size: 0.8rem; }
</style>
</head>
<body>

<header>
    <a href="index.html" class="logo">CubeVerse</a>
</header>

<div class="checkout-container">
    <div class="left-col">
        <div class="btn-back" onclick="history.back()">
            ← QUAY LẠI TRANG TRƯỚC
        </div>

        <div class="glass-panel" style="margin-top: 10px; margin-bottom: 20px;">
            <h2>📦 Giao hàng</h2>
            <div class="form-group"><label>Họ và tên</label><input type="text" placeholder="Nguyễn Văn A"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group"><label>Điện thoại</label><input type="tel" placeholder="09xxxxxxxx"></div>
                <div class="form-group"><label>Địa chỉ</label><input type="text" placeholder="Số nhà, đường..."></div>
            </div>
        </div>

        <div class="glass-panel">
            <h2>💳 Thanh toán</h2>
            <div class="payment-grid">
                <div class="pay-box" id="box-card" onclick="togglePayment('card')">
                    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
                    <div>VISA/Master</div>
                </div>
                <div class="pay-box" id="box-momo" onclick="togglePayment('momo')">
                    <svg viewBox="0 0 24 24" fill="#af206e"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.5 13.5h-9v-7h9v7z"/></svg>
                    <div>Ví MOMO</div>
                </div>
            </div>

            <div id="pay-card" class="dynamic-content">
                <input type="text" placeholder="Số thẻ" style="margin-bottom: 10px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" placeholder="MM/YY">
                    <input type="password" placeholder="CVV">
                </div>
            </div>

            <div id="pay-momo" class="dynamic-content" style="text-align: center;">
                <p style="font-size: 0.8rem; margin-bottom: 10px;">Quét mã QR dưới đây</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=CubeVersePay" style="border: 4px solid white; border-radius: 10px;">
            </div>
        </div>
    </div>

    <div class="right-col">
        <div class="glass-panel" style="position: sticky; top: 100px;">
            <h2>🛒 Đơn hàng</h2>
            <div id="order-items"></div>

            <div class="coupon-area">
                <label>Mã giảm giá</label>
                <div class="coupon-input">
                    <input type="text" id="coupon-code" placeholder="Nhập mã...">
                    <button class="btn-apply" onclick="applyCoupon()">DÙNG</button>
                </div>
                <div id="coupon-msg"></div>
            </div>

            <div class="price-info">
                <div class="price-row"><span>Tạm tính:</span><span id="sub-total">0đ</span></div>
                <div class="price-row" id="discount-row" style="display: none; color: var(--success);">
                    <span>Giảm giá:</span><span id="discount-val">-0đ</span>
                </div>
                <div class="total-row"><span>Tổng cộng:</span><span id="final-total">0đ</span></div>
            </div>

            <button class="btn-final" onclick="showConfirm()">XÁC NHẬN THANH TOÁN</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="confirm-modal">
    <div class="modal-content">
        <h3 style="color: var(--accent-light); font-family: 'Exo 2';">XÁC NHẬN ĐƠN HÀNG</h3>
        <p style="margin-top: 15px; font-size: 1rem;">Bạn có chắc chắn muốn thanh toán số tiền <br><b id="modal-price" style="font-size: 1.4rem; color: var(--success);">0đ</b> ?</p>
        <div class="modal-btns">
            <button class="btn-yes" onclick="processPayment()">CÓ</button>
            <button class="btn-no" onclick="closeModal()">KHÔNG</button>
        </div>
    </div>
</div>

<footer>&copy; 2026 CubeVerse. Giao diện bảo mật SSL.</footer>

<script>
    let subTotal = 0;
    let discountPercent = 0;
    const validCoupons = { "VANSON": 0.1, "CORNALLS": 0.3, "APR1LF00LS": 0.5 };

    function togglePayment(type) {
        document.querySelectorAll('.pay-box').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.dynamic-content').forEach(c => c.classList.remove('show'));
        if(type === 'card') {
            document.getElementById('box-card').classList.add('active');
            document.getElementById('pay-card').classList.add('show');
        } else {
            document.getElementById('box-momo').classList.add('active');
            document.getElementById('pay-momo').classList.add('show');
        }
    }

    function loadData() {
        const cart = JSON.parse(localStorage.getItem('cubeverse_cart')) || [];
        const container = document.getElementById('order-items');
        subTotal = 0;
        if(cart.length === 0) { container.innerHTML = '<p>Trống</p>'; return; }

        container.innerHTML = cart.map(item => {
            subTotal += item.price * item.qty;
            return `
                <div class="summary-item">
                    <img src="${item.img}" class="summary-img">
                    <div style="flex:1; font-size:0.85rem;">
                        <b>${item.name}</b><br>
                        <span style="opacity:0.6">SL: ${item.qty}</span>
                    </div>
                    <div style="font-size:0.85rem">${(item.price * item.qty).toLocaleString()}đ</div>
                </div>
            `;
        }).join('');
        updateUI();
    }

    function applyCoupon() {
        const code = document.getElementById('coupon-code').value.trim().toUpperCase();
        const msg = document.getElementById('coupon-msg');
        if (validCoupons[code]) {
            discountPercent = validCoupons[code];
            msg.textContent = "Áp dụng thành công!";
            msg.style.color = "var(--success)";
            document.getElementById('discount-row').style.display = 'flex';
        } else {
            discountPercent = 0;
            msg.textContent = "Mã không hợp lệ";
            msg.style.color = "var(--error)";
            document.getElementById('discount-row').style.display = 'none';
        }
        updateUI();
    }

    function updateUI() {
        const disc = subTotal * discountPercent;
        const final = subTotal - disc;
        document.getElementById('sub-total').textContent = subTotal.toLocaleString() + 'đ';
        document.getElementById('discount-val').textContent = '-' + disc.toLocaleString() + 'đ';
        document.getElementById('final-total').textContent = final.toLocaleString() + 'đ';
        document.getElementById('modal-price').textContent = final.toLocaleString() + 'đ';
    }

    /* --- LOGIC MODAL --- */
    function showConfirm() {
        document.getElementById('confirm-modal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('confirm-modal').style.display = 'none';
    }
    function processPayment() {
        // Xóa giỏ hàng sau khi thanh toán thành công
        localStorage.removeItem('cubeverse_cart');
        
        // Hiệu ứng giả lập xử lý
        const btn = document.querySelector('.btn-yes');
        btn.textContent = "ĐANG XỬ LÝ...";
        btn.disabled = true;

        setTimeout(() => {
            window.location.href = 'success.html'; // Chuyển đến trang thành công
        }, 1500);
    }

    window.onload = loadData;
</script>
</body>
</html>
